# golangci-lint configuration for Daxib (golangci-lint v2 schema).
#
# This is the depguard "belt" to internal/arch_test.go's "suspenders": the
# import-matrix law is encoded here as deny-lists AND asserted by a real test.
#
# AUTHORITY: internal/arch_test.go is the load-bearing gate and the strict
# SUPERSET — it goes red the moment the dependency law breaks, even with every
# linter uninstalled. This depguard config is a best-effort SUBSET that overlaps
# it as closely as the linter's model allows. CGO is off everywhere (pure-Go
# deps only).
#
# M1 ships only domain/version/service/cli/mcpserver, so the rules below name the
# v1 provider set (docs/PLAN.md §2/§6/§8) up front — a future provider add lands
# already-governed rather than silently un-denied.
version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - depguard      # the import-matrix deny-lists (the whole point)
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - misspell
    - gosec
  settings:
    depguard:
      rules:
        # ── Frontends import service + domain (+ version) ONLY ──
        # Files: internal/cli/**, internal/mcpserver/**. They may NOT reach any
        # provider, and must NOT import the OTHER frontend. depguard `files` globs
        # are matched against the absolute file path.
        frontends:
          files:
            - "**/internal/cli/**"
            - "**/internal/mcpserver/**"
          deny:
            - pkg: github.com/daxchain-io/daxib/internal/config
              desc: "frontends import service+domain(+version) only — not config"
            - pkg: github.com/daxchain-io/daxib/internal/keys
              desc: "frontends import service+domain only — not the keys provider"
            - pkg: github.com/daxchain-io/daxib/internal/descriptor
              desc: "frontends import service+domain only — not the descriptor provider"
            - pkg: github.com/daxchain-io/daxib/internal/backend
              desc: "frontends import service+domain only — not the backend provider"
            - pkg: github.com/daxchain-io/daxib/internal/coinselect
              desc: "frontends import service+domain only — not coinselect"
            - pkg: github.com/daxchain-io/daxib/internal/psbt
              desc: "frontends import service+domain only — not the psbt provider"
            - pkg: github.com/daxchain-io/daxib/internal/fee
              desc: "frontends import service+domain only — not fee"
            - pkg: github.com/daxchain-io/daxib/internal/fsx
              desc: "frontends import service+domain only — not fsx"
            - pkg: github.com/daxchain-io/daxib/internal/secret
              desc: "frontends import service+domain only — not secret"
            - pkg: github.com/daxchain-io/daxib/internal/policy
              desc: "frontends import service+domain only — not policy"
            - pkg: github.com/daxchain-io/daxib/internal/policyseal
              desc: "frontends import service+domain only — not policyseal"
            - pkg: github.com/daxchain-io/daxib/internal/journal
              desc: "frontends import service+domain only — not journal"
            - pkg: github.com/daxchain-io/daxib/internal/registry
              desc: "frontends import service+domain only — not registry"
            - pkg: github.com/daxchain-io/daxib/internal/contacts
              desc: "frontends import service+domain only — not the contacts address-book leaf"
            - pkg: github.com/daxchain-io/daxib/internal/bip322
              desc: "frontends import service+domain only — not the bip322 message-signing leaf"

        # ── mcpserver must NOT import cli (the reverse IS sanctioned) ──
        # The two frontends are independent adapters over the same core, with ONE
        # sanctioned cross-frontend edge: cli → mcpserver (Frontend 1's `mcp serve|
        # tools` command builds mcpserver.New(svc), hosting Frontend 2). The reverse
        # (mcpserver → cli) stays forbidden: the MCP server never reaches back into the
        # CLI. (arch_test.go is authoritative — TestFrontendsDoNotImportEachOther and
        # TestImportMatrix sanction exactly cli → mcpserver and deny mcpserver → cli.)
        mcpserver-not-cli:
          files:
            - "**/internal/mcpserver/**"
          deny:
            - pkg: github.com/daxchain-io/daxib/internal/cli
              desc: "mcpserver must not import cli — the cli → mcpserver edge is one-way (Frontend 1 hosts Frontend 2)"

        # ── The contract package imports nothing internal ──
        contract:
          files:
            - "**/internal/domain/**"
          deny:
            - pkg: github.com/daxchain-io/daxib/internal
              desc: "domain imports nothing internal (it is the wire contract)"

        # ── coinselect is a pure-value provider leaf (domain + stdlib + btcec) ──
        # It never imports the core/other-providers. Its production code must also
        # never import btcd/blockchain or btcd/mempool (those drag the validation/
        # chainstate tree in and threaten the offline CGO0+windows build); the
        # vsize/dust cross-checks against those packages live in _test.go ONLY,
        # which the exclusions block below exempts from the heavy-btcd deny.
        coinselect:
          files:
            - "**/internal/coinselect/**"
          deny:
            - pkg: github.com/daxchain-io/daxib/internal/service
              desc: "coinselect is a provider leaf — never the core"
            - pkg: github.com/daxchain-io/daxib/internal/backend
              desc: "coinselect is a pure-value leaf — no backend"
            - pkg: github.com/daxchain-io/daxib/internal/keys
              desc: "coinselect is a pure-value leaf — no keys"
            - pkg: github.com/btcsuite/btcd/blockchain
              desc: "coinselect production code must not import btcd/blockchain (offline-safe build); the vsize cross-check is _test.go only"
            - pkg: github.com/btcsuite/btcd/mempool
              desc: "coinselect production code must not import btcd/mempool (offline-safe build); the dust cross-check is _test.go only"

        # ── journal is a state provider leaf: domain + fsx (+ stdlib) ONLY ──
        journal:
          files:
            - "**/internal/journal/**"
          deny:
            - pkg: github.com/daxchain-io/daxib/internal/service
              desc: "journal is a provider leaf — never the core"
            - pkg: github.com/daxchain-io/daxib/internal/backend
              desc: "journal imports domain + fsx only — not backend"
            - pkg: github.com/daxchain-io/daxib/internal/keys
              desc: "journal imports domain + fsx only — not keys"
            - pkg: github.com/daxchain-io/daxib/internal/config
              desc: "journal imports domain + fsx only — not config"

        # ── contacts is a state provider leaf: domain + fsx (+ stdlib) ONLY ──
        # The local address book (name -> address). Like journal, it imports the
        # error taxonomy + the atomic-write/lock/perms helpers and nothing else of
        # ours: never the core (service), a frontend, or another provider.
        contacts:
          files:
            - "**/internal/contacts/**"
          deny:
            - pkg: github.com/daxchain-io/daxib/internal/service
              desc: "contacts is a provider leaf — never the core"
            - pkg: github.com/daxchain-io/daxib/internal/cli
              desc: "contacts is a provider leaf — never a frontend"
            - pkg: github.com/daxchain-io/daxib/internal/mcpserver
              desc: "contacts is a provider leaf — never a frontend"
            - pkg: github.com/daxchain-io/daxib/internal/backend
              desc: "contacts imports domain + fsx only — not backend"
            - pkg: github.com/daxchain-io/daxib/internal/keys
              desc: "contacts imports domain + fsx only — not keys (the service validates the address)"
            - pkg: github.com/daxchain-io/daxib/internal/config
              desc: "contacts imports domain + fsx only — not config"

        # ── policyseal is a LEAF crypto util: stdlib + x/crypto (+ domain) ONLY ──
        policyseal:
          files:
            - "**/internal/policyseal/**"
          deny:
            - pkg: github.com/daxchain-io/daxib/internal/service
              desc: "policyseal is a crypto leaf — never the core"
            - pkg: github.com/daxchain-io/daxib/internal/policy
              desc: "policyseal is a crypto leaf — policy depends on it, not the reverse"
            - pkg: github.com/daxchain-io/daxib/internal/config
              desc: "policyseal is a crypto leaf — config reads the anchor, not the reverse"
            - pkg: github.com/daxchain-io/daxib/internal/keys
              desc: "policyseal is a crypto leaf — no keys"

        # ── bip322 is a pure crypto leaf: domain + stdlib + btcd primitives ONLY ──
        # It implements BIP-322 "simple" message sign/verify over txscript/wire and
        # never imports the core, a frontend, OR another daxib provider (the keys
        # provider imports IT to sign; the reverse is forbidden). It must also stay
        # offline-safe: no btcd/blockchain or btcd/mempool (which drag the chainstate
        # tree in and threaten the CGO0+windows build).
        bip322:
          files:
            - "**/internal/bip322/**"
          deny:
            - pkg: github.com/daxchain-io/daxib/internal/service
              desc: "bip322 is a crypto leaf — never the core"
            - pkg: github.com/daxchain-io/daxib/internal/cli
              desc: "bip322 is a crypto leaf — never a frontend"
            - pkg: github.com/daxchain-io/daxib/internal/mcpserver
              desc: "bip322 is a crypto leaf — never a frontend"
            - pkg: github.com/daxchain-io/daxib/internal/keys
              desc: "bip322 is a leaf — keys imports it to sign, not the reverse"
            - pkg: github.com/btcsuite/btcd/blockchain
              desc: "bip322 must not import btcd/blockchain (offline-safe CGO0+windows build)"
            - pkg: github.com/btcsuite/btcd/mempool
              desc: "bip322 must not import btcd/mempool (offline-safe CGO0+windows build)"

        # ── psbt is a pure provider leaf: domain + stdlib + btcd primitives ONLY ──
        # The BIP-174 serialization/mechanics layer over btcutil/psbt. It holds NO keys
        # and makes NO policy decision (the service drives ownership + the policy
        # reservation + the keystore signer), so it never imports the core, a frontend,
        # OR another daxib provider (keys/backend/policy/coinselect). It must stay
        # offline-safe: no btcd/blockchain or btcd/mempool (which drag the chainstate
        # tree in and threaten the CGO0+windows build).
        psbt:
          files:
            - "**/internal/psbt/**"
          deny:
            - pkg: github.com/daxchain-io/daxib/internal/service
              desc: "psbt is a provider leaf — never the core"
            - pkg: github.com/daxchain-io/daxib/internal/cli
              desc: "psbt is a provider leaf — never a frontend"
            - pkg: github.com/daxchain-io/daxib/internal/mcpserver
              desc: "psbt is a provider leaf — never a frontend"
            - pkg: github.com/daxchain-io/daxib/internal/keys
              desc: "psbt holds no keys — the service supplies the signed witness to attach"
            - pkg: github.com/daxchain-io/daxib/internal/policy
              desc: "psbt makes no policy decision — the service runs eng.Reserve"
            - pkg: github.com/daxchain-io/daxib/internal/backend
              desc: "psbt is offline — the service re-verifies values against the backend"
            - pkg: github.com/daxchain-io/daxib/internal/coinselect
              desc: "psbt is a serialization leaf — the service drives coin selection"
            - pkg: github.com/btcsuite/btcd/blockchain
              desc: "psbt must not import btcd/blockchain (offline-safe CGO0+windows build)"
            - pkg: github.com/btcsuite/btcd/mempool
              desc: "psbt must not import btcd/mempool (offline-safe CGO0+windows build)"

        # ── policy is a state provider leaf: domain + policyseal + fsx + secret ──
        # It never imports the core (service), a frontend, OR the journal (service
        # drives orphan reconciliation across the policy/journal seam).
        policy:
          files:
            - "**/internal/policy/**"
          deny:
            - pkg: github.com/daxchain-io/daxib/internal/service
              desc: "policy is a provider leaf — never the core"
            - pkg: github.com/daxchain-io/daxib/internal/cli
              desc: "policy is a provider leaf — never a frontend"
            - pkg: github.com/daxchain-io/daxib/internal/mcpserver
              desc: "policy is a provider leaf — never a frontend"
            - pkg: github.com/daxchain-io/daxib/internal/journal
              desc: "policy must not import journal — service drives reconciliation across the seam"
            - pkg: github.com/daxchain-io/daxib/internal/backend
              desc: "policy is offline — no backend"
            - pkg: github.com/daxchain-io/daxib/internal/keys
              desc: "policy must not import keys — service supplies the sealed self-address snapshot"
            - pkg: github.com/daxchain-io/daxib/internal/config
              desc: "policy must not import config — service reads the anchor and hands it in"

  exclusions:
    rules:
      # The M6 MCP policy-bound-send integration test (package mcpserver_test) is the
      # SINGLE load-bearing seam that drives a REAL *service.Service through the MCP
      # frontend end-to-end: it must import the backend fake (and the backend package
      # for backend.Options) to stand up the service the way any client would, and seal
      # a policy to prove the over-limit send returns the SAME exit-3 envelope the CLI
      # gets. The AUTHORITATIVE import-matrix law (internal/arch_test.go, which inspects
      # non-test imports only) governs the production split and TestMcpserverImportsNoProvider
      # proves the production package imports NO provider; this external-test-package
      # provider use is the sanctioned end-to-end seam, exempt from the depguard SUBSET belt.
      - path: internal/mcpserver/policy_integration_test\.go
        linters:
          - depguard
      # The coinselect vsize/dust cross-check tests intentionally import
      # btcd/blockchain + btcd/mempool to PIN the inlined constants to btcd's own
      # weight/dust math (the whole point of the pin). Production code never does;
      # exempt the test files from the depguard heavy-btcd deny.
      - path: internal/coinselect/.*_test\.go
        linters:
          - depguard
      # Test fixtures may use patterns gosec flags (temp files, fixed creds, etc.).
      - path: _test\.go
        linters:
          - gosec
      # arch_test.go shells out to `go` and reads source dirs — those are the point
      # of the test, not findings.
      - path: internal/arch_test\.go
        linters:
          - gosec
          - errcheck

formatters:
  enable:
    - gofmt
